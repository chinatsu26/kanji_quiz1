<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz de Kanji Complet (60 Kanji)</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f8f9fa; color: #212529; padding: 20px; line-height: 1.6; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: #2c3e50; border-bottom: 3px solid #3498db; padding-bottom: 10px; }
        
        /* Menu */
        #menu { text-align: center; padding: 30px 0; }
        .mode-group { margin-bottom: 30px; padding: 20px; border: 2px solid #eee; border-radius: 15px; background: #fff; }
        .mode-title { font-size: 1.5em; font-weight: bold; margin-bottom: 15px; color: #34495e; }
        .menu-btn { padding: 15px 30px; font-size: 1.1em; margin: 10px; cursor: pointer; border: none; border-radius: 10px; transition: 0.3s; color: white; min-width: 220px; }
        .btn-blue { background-color: #3498db; }
        .btn-orange { background-color: #e67e22; }
        .menu-btn:hover { opacity: 0.8; transform: translateY(-2px); }

        /* Pagination */
        .pagination { display: none; flex-wrap: wrap; justify-content: center; gap: 5px; margin-bottom: 20px; }
        .pagination button { padding: 8px 12px; border: 1px solid #3498db; background: white; color: #3498db; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .pagination button.active { background: #3498db; color: white; }

        .instruction { display: none; background: #e9ecef; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; border-left: 5px solid #3498db; }
        
        .quiz-grid { display: grid; grid-template-columns: 1fr; gap: 15px; min-height: 200px; }
        .quiz-item { padding: 15px; border-bottom: 1px solid #dee2e6; font-size: 1.4em; }
        .q-num { color: #3498db; font-weight: bold; margin-right: 15px; }

        .btn-container { display: none; text-align: center; margin-top: 40px; gap: 10px; justify-content: center; }
        .action-btn { padding: 12px 25px; font-size: 1em; color: white; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; }
        .btn-verify { background-color: #28a745; }
        .btn-back { background-color: #6c757d; }
        .btn-hint { background-color: #f1c40f; color: #2c3e50; }

        #answer-section, #hint-section { display: none; margin-top: 20px; padding: 20px; border-radius: 10px; }
        #answer-section { background-color: #f1f9f1; border: 2px solid #28a745; }
        #hint-section { background-color: #fff9e6; border: 2px solid #f1c40f; }
        
        .answer-item { font-size: 1.2em; padding: 10px 0; border-bottom: 1px dashed #ccc; }
        .ans-kanji { font-weight: bold; color: #2c3e50; font-size: 1.2em; }
        .ans-kana { color: #d63384; font-weight: bold; margin: 0 10px; }
        .ans-trans { color: #666; font-style: italic; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="container">
    <h1 id="main-title">Apprentissage des Kanji</h1>
    
    <div id="menu">
        <div class="mode-group">
            <div class="mode-title">1. Vocabulaire (単語)</div>
            <button class="menu-btn btn-blue" onclick="startQuiz('vocab', 'lecture')">Lecture (読み)</button>
            <button class="menu-btn btn-orange" onclick="startQuiz('vocab', 'ecriture')">Écriture (書き)</button>
        </div>
        <div class="mode-group">
            <div class="mode-title">2. Phrases (文)</div>
            <button class="menu-btn btn-blue" onclick="startQuiz('phrases', 'lecture')">Lecture (読み)</button>
            <button class="menu-btn btn-orange" onclick="startQuiz('phrases', 'ecriture')">Écriture (書き)</button>
        </div>
    </div>

    <div class="pagination" id="pagination"></div>
    <p class="instruction" id="instruction-text"></p>
    <div class="quiz-grid" id="quiz-list"></div>

    <div class="btn-container" id="control-buttons">
        <button class="action-btn btn-back" onclick="goBack()">Menu</button>
        <button id="hint-btn" class="action-btn btn-hint" onclick="toggleHint()">Voir Traduction</button>
        <button id="show-answer-btn" class="action-btn btn-verify" onclick="toggleAnswers()">Vérifier</button>
    </div>

    <div id="hint-section">
        <h2 style="color: #856404; font-size: 1.1em;">Traductions (Indices)</h2>
        <div id="hint-list"></div>
    </div>

    <div id="answer-section">
        <h2 style="color: #28a745; font-size: 1.1em;">Réponses Correctes</h2>
        <div id="answer-list"></div>
    </div>
</div>

        },

    function startQuiz(cat, md) {
        category = cat;
        mode = md;
        document.getElementById('menu').style.display = 'none';
        document.getElementById('pagination').style.display = 'flex';
        document.getElementById('control-buttons').style.display = 'flex';
        document.getElementById('instruction-text').style.display = 'block';
        
        const typeStr = (category === 'vocab') ? "Vocabulaire (単語)" : "Phrases (文)";
        const modeStr = (mode === 'lecture') ? "Lecture (読み)" : "Écriture (書き)";
        document.getElementById('instruction-text').innerText = `${typeStr} - ${modeStr}`;
        
        renderPage(0);
    }

    function renderPage(idx) {
        currentPage = idx;
        const page = quizData[idx];
        document.getElementById('main-title').innerText = `Page ${idx+1} : ${page.kanji}`;
        
        const items = (category === 'vocab') ? page.vocab : page.phrases;
        const qList = document.getElementById('quiz-list');
        const aList = document.getElementById('answer-list');
        const hList = document.getElementById('hint-list');
        
        qList.innerHTML = ''; aList.innerHTML = ''; hList.innerHTML = '';
        document.getElementById('answer-section').style.display = 'none';
        document.getElementById('hint-section').style.display = 'none';

        items.forEach((item, i) => {
            const qDisplay = (mode === 'lecture') ? item.k : item.r;
            qList.innerHTML += `<div class="quiz-item"><span class="q-num">${i + 1}</span> ${qDisplay}</div>`;
            hList.innerHTML += `<div class="answer-item"><span class="q-num">${i + 1}</span> <b>${item.f}</b></div>`;
            
            // 回答セクションの表示（HTMLタグを除去してテキストのみ表示する工夫が必要な場合はここで処理）
            const cleanR = item.r.replace(/<\/?[^>]+(>|$)/g, ""); 
            aList.innerHTML += `<div class="answer-item">
                <span class="q-num">${i + 1}</span>
                <span class="ans-kanji">${item.k}</span>
                <span class="ans-kana">【${cleanR}】</span>
                <span class="ans-trans">(${item.f})</span>
            </div>`;
        });

        document.querySelectorAll('.pagination button').forEach((btn, i) => {
            btn.className = (i === idx) ? 'active' : '';
        });
    }

    function goBack() {
        document.getElementById('menu').style.display = 'block';
        document.getElementById('pagination').style.display = 'none';
        document.getElementById('control-buttons').style.display = 'none';
        document.getElementById('instruction-text').style.display = 'none';
        document.getElementById('main-title').innerText = "Apprentissage des Kanji";
    }

    function toggleAnswers() {
        const s = document.getElementById('answer-section');
        s.style.display = (s.style.display === 'block') ? 'none' : 'block';
    }

    function toggleHint() {
        const s = document.getElementById('hint-section');
        s.style.display = (s.style.display === 'block') ? 'none' : 'block';
    }

    const nav = document.getElementById('pagination');
    quizData.forEach((_, i) => {
        const btn = document.createElement('button');
        btn.innerText = i + 1;
        btn.onclick = () => renderPage(i);
        nav.appendChild(btn);
    });
</script>
</body>
</html>
